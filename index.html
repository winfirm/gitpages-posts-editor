<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPages Posts Editor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>GitPages Posts Editor</h1>
      <div class="header-actions">
        <button id="btn-load-github" class="btn btn-primary">Load GitHub</button>
        <button id="btn-settings" class="btn btn-secondary">Settings</button>
      </div>
    </header>
    
    <main class="main">
      <aside class="sidebar">
        <div class="sidebar-header">
          <input type="text" id="search-input" placeholder="Search articles..." class="search-input">
          <select id="sort-select" class="sort-select">
            <option value="date-desc">Date (New→Old)</option>
            <option value="date-asc">Date (Old→New)</option>
            <option value="title-asc">Title (A→Z)</option>
            <option value="title-desc">Title (Z→A)</option>
          </select>
        </div>
        <ul id="article-list" class="article-list"></ul>
        <div class="sidebar-footer">
          <button id="btn-new-article" class="btn btn-success">New Post</button>
        </div>
      </aside>
      
      <section class="editor-section">
        <div class="editor-toolbar">
          <button id="btn-save" class="btn btn-primary" disabled>Save</button>
          <input type="text" id="filename-input" class="filename-input" placeholder="filename.md" disabled>
          <button id="btn-undo" class="btn btn-secondary" disabled>Undo</button>
          <button id="btn-preview" class="btn btn-secondary">Show Preview</button>
          <button id="btn-ai" class="btn btn-ai" style="display: none;">AI Assistant</button>
        </div>
        <div class="editor-container">
          <div class="editor-pane">
            <textarea id="editor" class="editor" placeholder="Write your Markdown here..." disabled></textarea>
          </div>
          <div class="preview-pane">
            <div id="preview" class="preview"></div>
          </div>
        </div>
      </section>
    </main>
    
    <footer class="footer">
      <span id="status-mode">Mode: GitHub</span>
      <span id="status-file">File: none selected</span>
      <span id="status-ai">AI: disconnected</span>
    </footer>
  </div>
  
  <!-- AI Assistant Modal -->
  <div id="ai-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>AI Assistant</h2>
        <button id="btn-close-modal" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="ai-tabs">
          <button class="ai-tab active" data-tab="generate">Generate</button>
          <button class="ai-tab" data-tab="optimize">Optimize</button>
          <button class="ai-tab" data-tab="translate">Translate</button>
        </div>
        <div class="ai-tab-content active" id="tab-generate">
          <textarea id="ai-prompt" placeholder="Enter a prompt, e.g. Write a post about Python async programming..." rows="4"></textarea>
          <button id="btn-generate" class="btn btn-primary">Generate</button>
        </div>
        <div class="ai-tab-content" id="tab-optimize" style="display: none;">
          <textarea id="ai-optimize-instructions" placeholder="Enter optimization instructions, e.g. Improve structure and readability..." rows="4"></textarea>
          <button id="btn-optimize" class="btn btn-primary">Optimize</button>
        </div>
        <div class="ai-tab-content" id="tab-translate" style="display: none;">
          <select id="ai-target-language" class="form-select">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
          <button id="btn-translate" class="btn btn-primary">Translate</button>
        </div>
        <div id="ai-result" class="ai-result" style="display: none;">
          <h3>AI Result</h3>
          <div id="ai-result-content" class="ai-result-content"></div>
          <div class="ai-result-actions">
            <button id="btn-apply-ai" class="btn btn-success">Apply to Editor</button>
            <button id="btn-copy-ai" class="btn btn-secondary">Copy</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Settings Modal -->
  <div id="settings-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>GitHub Config</h3>
          <div class="form-group">
            <label for="github-owner">Repository Owner</label>
            <input type="text" id="github-owner" class="form-input" placeholder="username">
          </div>
          <div class="form-group">
            <label for="github-repo">Repository Name</label>
            <input type="text" id="github-repo" class="form-input" placeholder="repo-name">
          </div>
          <div class="form-group">
            <label for="github-token">GitHub Token</label>
            <input type="password" id="github-token" class="form-input" placeholder="ghp_xxxxxxxxxxxx">
          </div>
          <div class="form-group">
            <label for="github-branch">Branch</label>
            <input type="text" id="github-branch" class="form-input" value="main">
          </div>
        </div>
        
        <div class="settings-section">
          <h3>LMStudio Config</h3>
          <div class="form-group">
            <label for="lmstudio-url">API URL</label>
            <input type="text" id="lmstudio-url" class="form-input" value="http://localhost:1234/v1/chat/completions">
          </div>
          <div class="form-group">
            <label for="lmstudio-model">Model Name</label>
            <input type="text" id="lmstudio-model" class="form-input" value="local-model">
          </div>
        </div>
        
        <div class="settings-footer">
          <button id="btn-save-settings" class="btn btn-primary">Save Settings</button>
          <button id="btn-test-connection" class="btn btn-secondary">Test Connection</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/fileManager.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/aiAssistant.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
