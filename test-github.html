<!DOCTYPE html>
<html>
<head>
  <title>GitHub API 测试</title>
</head>
<body>
  <h1>GitHub API 连接测试</h1>
  <div id="result"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const owner = params.get('owner');
    const repo = params.get('repo');
    
    if (token && owner && repo) {
      fetch(`https://api.github.com/repos/${owner}/${repo}`, {
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json'
        }
      })
      .then(r => r.json())
      .then(data => {
        if (data.message) {
          document.getElementById('result').innerHTML = `<p style="color:red">错误: ${data.message}</p>`;
        } else {
          document.getElementById('result').innerHTML = `
            <p style="color:green">✓ 连接成功!</p>
            <p>仓库: ${data.full_name}</p>
            <p>描述: ${data.description || '无'}</p>
            <p>默认分支: ${data.default_branch}</p>
          `;
        }
      })
      .catch(err => {
        document.getElementById('result').innerHTML = `<p style="color:red">请求失败: ${err.message}</p>`;
      });
    } else {
      document.getElementById('result').innerHTML = '<p>请提供 token, owner, repo 参数</p>';
    }
  </script>
</body>
</html>
